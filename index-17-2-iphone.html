<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time 4 Math</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&amp;family=Comic+Neue:wght@400;700&amp;display=swap');
        
        :root {
            --primary: #ffeb3b;
            --accent: #ff4081;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 235, 59, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 64, 129, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .screen.active {
            display: flex;
        }
        
        h1 {
            font-family: 'Comic Neue', cursive;
            font-size: 4.5rem;
            background: linear-gradient(90deg, #ffeb3b, #ff4081, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 235, 59, 0.5);
            margin-bottom: 20px;
            animation: titleBounce 2s infinite ease-in-out;
        }
        
        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .emoji-title {
            font-size: 3rem;
            margin: 0 15px;
        }
        
        input[type="text"],
        input[type="number"] {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #1a1a2e;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        button {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #ffeb3b, #ff4081);
            color: #1a1a2e;
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        
        button:hover {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 12px 30px rgba(255, 64, 129, 0.6);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-small {
            padding: 10px 20px;
            font-size: 1.1rem;
        }
        
        .go-btn {
            background: linear-gradient(90deg, #00e5ff, #ffeb3b);
            font-size: 2rem;
            padding: 18px 50px;
            opacity: 0.4;
            pointer-events: none;
            transition: all 0.4s;
        }
        
        .go-btn.active {
            opacity: 1;
            pointer-events: all;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .welcome {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .settings-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 620px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #ffeb3b;
        }
        
        .range-inputs {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.6rem;
        }
        
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .checkbox-group label {
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 24px;
            height: 24px;
            accent-color: #ffeb3b;
        }
        
        .difficulty-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .difficulty-btn {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            border-radius: 20px;
            font-size: 1.3rem;
            text-align: center;
            background: #2a2a4a;
            border: 4px solid transparent;
            transition: all 0.3s;
        }
        
        .difficulty-btn.active {
            border-color: #ffeb3b;
            background: #3a3a5a;
            transform: scale(1.05);
        }
        
        .flashcard-screen {
            text-align: center;
        }
        
        .problem-header {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #00e5ff;
        }
        
        #question {
            font-size: 3.5rem;
            background: rgba(255,255,255,0.1);
            padding: 30px 40px;
            border-radius: 30px;
            min-height: 120px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2);
        }
        
        #answer-input {
            width: 280px;
            margin-bottom: 20px;
        }
        
        .timer-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .timer-bar {
            height: 18px;
            background: #2a2a4a;
            border-radius: 9999px;
            width: 320px;
            overflow: hidden;
        }
        
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #00e5ff, #ffeb3b);
            width: 100%;
            transition: width 0.3s linear;
        }
        
        .feedback {
            font-size: 2rem;
            min-height: 60px;
            margin-top: 10px;
        }
        
        .correct {
            color: #00ff9d;
            animation: pop 0.4s;
        }
        
        .wrong {
            color: #ff4081;
            animation: shake 0.4s;
        }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* MEMORY SCREEN - STRICT VIEWPORT FIT */
        .memory-screen {
            padding: 15px 20px 20px;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .memory-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 12px;
            font-size: 1.6rem;
            flex-shrink: 0;
        }
        
        .memory-header div {
            background: rgba(255,255,255,0.1);
            padding: 12px 28px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        #memory-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: min(1100px, calc(100vw - 40px));
            margin: 0 auto;
            align-self: stretch;
            min-height: 0;
        }
        
        .memory-card {
            width: 100%;
            height: 100%;
            perspective: 1200px;
            cursor: pointer;
        }
        
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.75s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            will-change: transform;
        }
        
        .memory-card.flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        
        .memory-card-front,
        .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            transform: translateZ(0); /* Force hardware acceleration */
        }
        
        .memory-card-front {
            background: linear-gradient(135deg, #ff4081, #00e5ff);
            transform: rotateY(180deg);
        }
        
        .memory-card-back {
            background: linear-gradient(135deg, #2a2a4a, #3a3a5a);
            box-shadow: inset 0 0 30px rgba(255,235,59,0.3);
        }
        
        .memory-card-back::before {
            content: '🍎';
            font-size: 2.8rem;
            animation: wiggle 2s infinite;
        }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }
        
        .memory-instruction {
            margin-top: 12px;
            text-align: center;
            font-size: 1.25rem;
            opacity: 0.85;
            max-width: 1100px;
            flex-shrink: 0;
            line-height: 1.3;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 30px;
            padding: 40px 50px;
            text-align: center;
            max-width: 520px;
            box-shadow: 0 0 60px #ffeb3b;
            animation: modalPop 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        
        .modal-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffeb3b;
        }
        
        .score-box {
            background: rgba(255,235,59,0.15);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.8rem;
        }
        
        .data-buttons {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff9d;
            color: #1a1a2e;
            padding: 14px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.4);
            font-size: 1.3rem;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 9999;
        }
        
        .sandbox-notice {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 64, 129, 0.9);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.4);
            display: none;
            z-index: 9999;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <!-- (All other screens remain the same as before) -->
    <!-- LANDING, SETTINGS, FLASHCARD, MEMORY, MODALS ... -->

    <!-- MEMORY SCREEN -->
    <div id="memory" class="screen memory-screen">
        <div class="memory-header">
            <div>🎮 Game Score: <span id="game-score" style="color:#ffeb3b; font-size:2rem;">0</span></div>
            <div>🔄 Turns left: <span id="turns-left" style="color:#00e5ff; font-size:2rem;">8</span></div>
            <div>🏆 Lifetime: <span id="lifetime-score" style="color:#ff4081; font-size:2rem;">0</span></div>
        </div>
        
        <div id="memory-grid"></div>
        
        <div class="memory-instruction">
            Match the tasty treats! 🍒 = 5 pts • 🍰 = 10 pts • Everything else = 2 pts<br>
            Matches are FREE turns! Wrong matches cost 1 turn.
        </div>
    </div>

    <!-- ... rest of your modals and audio elements stay exactly the same ... -->

    <script>
        // ... (all previous JavaScript remains the same until the memory card creation part)

        // ====================== MEMORY GAME ======================
        function startMemoryGame() {
            gameScore = 0;
            matchedPairs = 0;
            document.getElementById('game-score').textContent = gameScore;
            document.getElementById('turns-left').textContent = turnsLeft;
            document.getElementById('lifetime-score').textContent = usersData[currentUser] ? usersData[currentUser].lifetimeScore : 0;
            
            const shuffledPool = shuffle(emojiPool);
            const selectedEmojis = shuffledPool.slice(0, 12);
            
            memoryCards = [];
            selectedEmojis.forEach(emoji => {
                memoryCards.push({ emoji, id: Math.random(), matched: false });
                memoryCards.push({ emoji, id: Math.random(), matched: false });
            });
            memoryCards = shuffle(memoryCards);
            
            const grid = document.getElementById('memory-grid');
            grid.innerHTML = '';
            
            memoryCards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'memory-card';
                cardEl.dataset.index = index;
                
                cardEl.innerHTML = `
                    <div class="memory-card-inner">
                        <div class="memory-card-front">${card.emoji}</div>
                        <div class="memory-card-back"></div>
                    </div>
                `;
                
                cardEl.addEventListener('click', handleCardClick);
                grid.appendChild(cardEl);
            });
            
            showScreen('memory');
            firstFlipped = null;
            secondFlipped = null;
        }

        // The rest of your code (handleCardClick, endMemoryGame, etc.) stays unchanged

        // ====================== START THE GAME ======================
        window.onload = function() {
            loadUsersData();
            initSounds();
            setupSettingsListeners();
            initEventListeners();
            
            console.log('%c🍎 Time 4 Math ready! (iOS Safari card flip fix applied)', 'color:#ffeb3b; font-size:13px;');
        };
    </script>
</body>
</html>
